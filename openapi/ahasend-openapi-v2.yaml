paths:
  # Utility endpoints
  /v2/ping:
    get:
      summary: AhaSend Ping
      description: Health check endpoint that returns a simple pong response
      operationId: ping
      tags:
      - Utility
      security:
      - BearerAuth: []
      x-code-samples:
      - lang: go
        label: AhaSend Go SDK
        source: |
          package main

          import (
            "context"
            "fmt"
            "log"

            "github.com/AhaSend/ahasend-go/api"
          )

          func main() {
            // Create API client with authentication
            client := api.NewAPIClient(
              api.WithAPIKey("aha-sk-your-64-character-key"),
            )

            // Create context for the API call
            ctx := context.Background()

            // Call the ping endpoint
            response, httpResp, err := client.UtilityAPI.Ping(ctx)
            if err != nil {
              log.Fatalf("Error pinging API: %v", err)
            }

            // Check response
            if httpResp.StatusCode == 200 {
              fmt.Printf("✅ Ping successful! Status: %d\n", httpResp.StatusCode)
              if response != nil && response.Message != "" {
                  fmt.Printf("Response: %s\n", response.Message)
              }
            } else {
              fmt.Printf("❌ Unexpected status code: %d\n", httpResp.StatusCode)
            }
          }



      responses:
        '200':
          description: Pong response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
              example:
                message: "pong"
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                message: "missing or malformed bearer token"
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                message: invalid API key
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                message: insufficient permissions for the required scope
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                message: internal server error

  # API Keys endpoints
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /v2/accounts/{account_id}/api-keys:
    get:
      summary: AhaSend Get API Keys
      description: Returns a list of API keys for the account
      operationId: getAPIKeys
      tags:
      - API Keys
      parameters:
      - name: account_id
        in: path
        required: true
        description: Account ID
        schema:
          type: string
          format: uuid
        example: '500123'
      - name: limit
        in: query
        description: Maximum number of items to return
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 100
        example: 1
      - name: after
        in: query
        description: Pagination cursor for the next page. Provide the value provided in `next_cursor` from the response.
        schema:
          type: string
        example: example_value
      - name: before
        in: query
        description: Pagination cursor for the previous page.
        schema:
          type: string
        example: example_value
      security:
      - BearerAuth: ["api-keys:read"]
      x-code-samples:
      - lang: go
        label: AhaSend Go SDK
        source: |
          package main

          import (
            "context"
            "fmt"
            "log"

            "github.com/AhaSend/ahasend-go/api"
            "github.com/google/uuid"
          )

          func main() {
            // Create API client with authentication
            client := api.NewAPIClient(
              api.WithAPIKey("aha-sk-your-64-character-key"),
            )

            accountID := uuid.New()

            // Create context for the API call
            ctx := context.Background()

            // Call the ping endpoint
            response, httpResp, err := client.APIKeysAPI.GetAPIKeys(
              ctx,
              accountID,
              nil,
              nil,
            )
            if err != nil {
              log.Fatalf("Error getting API keys: %v", err)
            }

            // Check response
            if httpResp.StatusCode == 200 {
              fmt.Printf("✅ Status: %d\n", httpResp.StatusCode)
              if response != nil {
                fmt.Printf("Found %d API keys\n", len(response.Data))
              }
            } else {
              fmt.Printf("❌ Unexpected status code: %d\n", httpResp.StatusCode)
            }
          }

      responses:
        '200':
          description: List of API keys
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAPIKeysResponse'
              examples:
                getAPIKeys200Example:
                  summary: Default getAPIKeys 200 response
                  x-microcks-default: true
                  value:
                    object: list
                    data:
                    - {}
                    pagination:
                      has_more: {}
                      next_cursor: {}
                      previous_cursor: {}
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                getAPIKeys401Example:
                  summary: Default getAPIKeys 401 response
                  x-microcks-default: true
                  value:
                    message: example_value
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                getAPIKeys403Example:
                  summary: Default getAPIKeys 403 response
                  x-microcks-default: true
                  value:
                    message: example_value
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

              examples:
                getAPIKeys500Example:
                  summary: Default getAPIKeys 500 response
                  x-microcks-default: true
                  value:
                    message: example_value
