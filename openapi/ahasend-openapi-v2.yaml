        delay: 0
        dispatcher: FALLBACK
    post:
      summary: AhaSend Create API Key
      description: Creates a new API key with the specified scopes
      operationId: createAPIKey
      tags:
      - API Keys
      parameters:
      - name: account_id
        in: path
        required: true
        description: Account ID
        schema:
          type: string
          format: uuid
        example: '500123'
      - $ref: '#/components/parameters/IdempotencyKey'
        example: example
      security:
      - BearerAuth: ["api-keys:write"]
      x-code-samples:
      - lang: go
        label: AhaSend Go SDK
        source: |
          package main

          import (
            "context"
            "fmt"
            "log"

            "github.com/AhaSend/ahasend-go/api"
            "github.com/AhaSend/ahasend-go/models/requests"
            "github.com/google/uuid"
          )

          func main() {
            // Create API client with authentication
            client := api.NewAPIClient(
              api.WithAPIKey("aha-sk-your-64-character-key"),
            )

            accountID := uuid.New()

            // Create context for the API call
            ctx := context.Background()

            // Call the ping endpoint
            response, httpResp, err := client.APIKeysAPI.CreateAPIKey(
              ctx,
              accountID,
              requests.CreateAPIKeyRequest{
                Label: "My API Key",
                Scopes: []string{
                  "messages:read:all",
                  "domains:read:all",
                },
              },
            )
            if err != nil {
              log.Fatalf("Error creating API key: %v", err)
            }

            // Check response
            if httpResp.StatusCode == 200 {
              fmt.Printf("✅ Status: %d\n", httpResp.StatusCode)
              if response != nil {
                fmt.Printf("Created API key, secret key: %s\n", response.SecretKey)
              }
            } else {
              fmt.Printf("❌ Unexpected status code: %d\n", httpResp.StatusCode)
            }
          }

      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAPIKeyRequest'
      responses:
        '201':
          description: API key created successfully
          headers:
            Idempotent-Replayed:
              $ref: '#/components/headers/IdempotentReplayed'
          content:
            application/json:
              schema:
