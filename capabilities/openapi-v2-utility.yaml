naftiko: 1.0.0-alpha2
info:
  label: AhaSend API v2 — Utility
  description: 'AhaSend API v2 — Utility. 1 operations. Lead operation: AhaSend Ping. Self-contained Naftiko capability covering
    one Ahasend business surface.'
  tags:
  - Ahasend
  - Utility
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AHASEND_API_KEY: AHASEND_API_KEY
capability:
  consumes:
  - type: http
    namespace: openapi-v2-utility
    baseUri: https://api.ahasend.com
    description: AhaSend API v2 — Utility business capability. Self-contained, no shared references.
    resources:
    - name: v2-ping
      path: /v2/ping
      operations:
      - name: ping
        method: GET
        description: AhaSend Ping
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.AHASEND_API_KEY}}'
  exposes:
  - type: rest
    namespace: openapi-v2-utility-rest
    port: 8080
    description: REST adapter for AhaSend API v2 — Utility. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/v2/ping
      name: v2-ping
      description: REST surface for v2-ping.
      operations:
      - method: GET
        name: ping
        description: AhaSend Ping
        call: openapi-v2-utility.ping
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: openapi-v2-utility-mcp
    port: 9090
    transport: http
    description: MCP adapter for AhaSend API v2 — Utility. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: ahasend-ping
      description: AhaSend Ping
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: openapi-v2-utility.ping
      outputParameters:
      - type: object
        mapping: $.
