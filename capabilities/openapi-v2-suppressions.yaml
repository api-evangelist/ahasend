naftiko: 1.0.0-alpha2
info:
  label: AhaSend API v2 — Suppressions
  description: 'AhaSend API v2 — Suppressions. 4 operations. Lead operation: AhaSend Get Suppressions. Self-contained Naftiko
    capability covering one Ahasend business surface.'
  tags:
  - Ahasend
  - Suppressions
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AHASEND_API_KEY: AHASEND_API_KEY
capability:
  consumes:
  - type: http
    namespace: openapi-v2-suppressions
    baseUri: https://api.ahasend.com
    description: AhaSend API v2 — Suppressions business capability. Self-contained, no shared references.
    resources:
    - name: v2-accounts-account_id-suppressions
      path: /v2/accounts/{account_id}/suppressions
      operations:
      - name: getsuppressions
        method: GET
        description: AhaSend Get Suppressions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: account_id
          in: path
          type: string
          description: Account ID
          required: true
        - name: domain
          in: query
          type: string
          description: Filter by domain
        - name: email
          in: query
          type: string
          description: Email address
          required: true
        - name: from_date
          in: query
          type: string
          description: Filter suppressions created after this date (RFC3339 format)
        - name: to_date
          in: query
          type: string
          description: Filter suppressions created before this date (RFC3339 format)
        - name: limit
          in: query
          type: integer
          description: Maximum number of items to return (1-100)
        - name: after
          in: query
          type: string
          description: Pagination cursor for the next page. Provide the value provided in `next_cursor` from the response.
        - name: before
          in: query
          type: string
          description: Pagination cursor for the previous page. Provide the value provided in `previous_cursor` from the response.
      - name: createsuppression
        method: POST
        description: AhaSend Create Suppression
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: account_id
          in: path
          type: string
          description: Account ID
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deletesuppression
        method: DELETE
        description: AhaSend Delete Suppression
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: account_id
          in: path
          type: string
          description: Account ID
          required: true
        - name: email
          in: query
          type: string
          description: Email address
          required: true
        - name: domain
          in: query
          type: string
          description: Optional domain filter
    - name: v2-accounts-account_id-suppressions-all
      path: /v2/accounts/{account_id}/suppressions/all
      operations:
      - name: deleteallsuppressions
        method: DELETE
        description: AhaSend Delete All Suppressions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: account_id
          in: path
          type: string
          description: Account ID
          required: true
        - name: domain
          in: query
          type: string
          description: Optional domain filter
    authentication:
      type: bearer
      token: '{{env.AHASEND_API_KEY}}'
  exposes:
  - type: rest
    namespace: openapi-v2-suppressions-rest
    port: 8080
    description: REST adapter for AhaSend API v2 — Suppressions. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/v2/accounts/{account-id}/suppressions
      name: v2-accounts-account-id-suppressions
      description: REST surface for v2-accounts-account_id-suppressions.
      operations:
      - method: GET
        name: getsuppressions
        description: AhaSend Get Suppressions
        call: openapi-v2-suppressions.getsuppressions
        with:
          account_id: rest.account_id
          domain: rest.domain
          email: rest.email
          from_date: rest.from_date
          to_date: rest.to_date
          limit: rest.limit
          after: rest.after
          before: rest.before
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createsuppression
        description: AhaSend Create Suppression
        call: openapi-v2-suppressions.createsuppression
        with:
          account_id: rest.account_id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletesuppression
        description: AhaSend Delete Suppression
        call: openapi-v2-suppressions.deletesuppression
        with:
          account_id: rest.account_id
          email: rest.email
          domain: rest.domain
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v2/accounts/{account-id}/suppressions/all
      name: v2-accounts-account-id-suppressions-all
      description: REST surface for v2-accounts-account_id-suppressions-all.
      operations:
      - method: DELETE
        name: deleteallsuppressions
        description: AhaSend Delete All Suppressions
        call: openapi-v2-suppressions.deleteallsuppressions
        with:
          account_id: rest.account_id
          domain: rest.domain
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: openapi-v2-suppressions-mcp
    port: 9090
    transport: http
    description: MCP adapter for AhaSend API v2 — Suppressions. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: ahasend-get-suppressions
      description: AhaSend Get Suppressions
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: openapi-v2-suppressions.getsuppressions
      with:
        account_id: tools.account_id
        domain: tools.domain
        email: tools.email
        from_date: tools.from_date
        to_date: tools.to_date
        limit: tools.limit
        after: tools.after
        before: tools.before
      outputParameters:
      - type: object
        mapping: $.
    - name: ahasend-create-suppression
      description: AhaSend Create Suppression
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: openapi-v2-suppressions.createsuppression
      with:
        account_id: tools.account_id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: ahasend-delete-suppression
      description: AhaSend Delete Suppression
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: openapi-v2-suppressions.deletesuppression
      with:
        account_id: tools.account_id
        email: tools.email
        domain: tools.domain
      outputParameters:
      - type: object
        mapping: $.
    - name: ahasend-delete-all-suppressions
      description: AhaSend Delete All Suppressions
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: openapi-v2-suppressions.deleteallsuppressions
      with:
        account_id: tools.account_id
        domain: tools.domain
      outputParameters:
      - type: object
        mapping: $.
