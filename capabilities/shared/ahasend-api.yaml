naftiko: "1.0.0-alpha1"

info:
  label: "AhaSend API v2"
  description: "AhaSend transactional email API providing message sending, domain management, webhook configuration, route management, suppression lists, SMTP credentials, and delivery statistics."
  tags:
    - Email
    - Transactional Email
    - Webhooks
    - SMTP
  created: "2026-04-19"
  modified: "2026-04-19"

binds:
  - namespace: env
    keys:
      AHASEND_API_KEY: AHASEND_API_KEY
      AHASEND_ACCOUNT_ID: AHASEND_ACCOUNT_ID

capability:
  consumes:
    - type: http
      namespace: ahasend
      baseUri: https://api.ahasend.com
      description: "AhaSend transactional email REST API v2"
      authentication:
        type: bearer
        token: "{{AHASEND_API_KEY}}"
      resources:
        - name: messages
          path: /v2/accounts/{account_id}/messages
          description: "Send and manage transactional email messages"
          operations:
            - name: list-messages
              method: GET
              description: "List messages for an account"
              inputParameters:
                - name: account_id
                  in: path
                  type: string
                  required: true
                  description: "Account identifier"
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Maximum number of items to return"
                - name: cursor
                  in: query
                  type: string
                  required: false
                  description: "Pagination cursor"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: send-message
              method: POST
              description: "Send a transactional email message"
              inputParameters:
                - name: account_id
                  in: path
                  type: string
                  required: true
                  description: "Account identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  from: "{{tools.from}}"
                  to: "{{tools.to}}"
                  subject: "{{tools.subject}}"
                  html: "{{tools.html}}"
        - name: domains
          path: /v2/accounts/{account_id}/domains
          description: "Manage sending domains"
          operations:
            - name: list-domains
              method: GET
              description: "List all domains for an account"
              inputParameters:
                - name: account_id
                  in: path
                  type: string
                  required: true
                  description: "Account identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-domain
              method: POST
              description: "Add a new sending domain"
              inputParameters:
                - name: account_id
                  in: path
                  type: string
                  required: true
                  description: "Account identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  domain: "{{tools.domain}}"
        - name: webhooks
          path: /v2/accounts/{account_id}/webhooks
          description: "Manage event webhooks"
          operations:
            - name: list-webhooks
              method: GET
              description: "List all webhooks for an account"
              inputParameters:
                - name: account_id
                  in: path
                  type: string
                  required: true
                  description: "Account identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-webhook
              method: POST
              description: "Create a new webhook"
              inputParameters:
                - name: account_id
                  in: path
                  type: string
                  required: true
                  description: "Account identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  url: "{{tools.url}}"
                  events: "{{tools.events}}"
        - name: suppressions
          path: /v2/accounts/{account_id}/suppressions
          description: "Manage email suppression lists"
          operations:
            - name: list-suppressions
              method: GET
              description: "List suppressed email addresses"
              inputParameters:
                - name: account_id
                  in: path
                  type: string
                  required: true
                  description: "Account identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: statistics
          path: /v2/accounts/{account_id}/statistics/transactional/deliverability
          description: "Email delivery statistics and analytics"
          operations:
            - name: get-deliverability-stats
              method: GET
              description: "Get transactional email deliverability statistics"
              inputParameters:
                - name: account_id
                  in: path
                  type: string
                  required: true
                  description: "Account identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: ahasend-rest
      resources:
        - path: /v1/messages
          name: messages
          description: "Send and retrieve transactional email messages"
          operations:
            - method: GET
              name: list-messages
              description: "List email messages"
              call: "ahasend.list-messages"
              with:
                account_id: "rest.account_id"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: send-message
              description: "Send an email message"
              call: "ahasend.send-message"
              with:
                account_id: "rest.account_id"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/domains
          name: domains
          description: "Manage sending domains"
          operations:
            - method: GET
              name: list-domains
              description: "List domains"
              call: "ahasend.list-domains"
              with:
                account_id: "rest.account_id"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: ahasend-mcp
      transport: http
      tools:
        - name: list-messages
          description: "List transactional email messages"
          hints:
            readOnly: true
            openWorld: true
          call: "ahasend.list-messages"
          with:
            account_id: "tools.account_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: send-email
          description: "Send a transactional email"
          hints:
            readOnly: false
            destructive: false
          call: "ahasend.send-message"
          with:
            account_id: "tools.account_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-domains
          description: "List sending domains"
          hints:
            readOnly: true
            openWorld: true
          call: "ahasend.list-domains"
          with:
            account_id: "tools.account_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-webhooks
          description: "List configured webhooks"
          hints:
            readOnly: true
            openWorld: true
          call: "ahasend.list-webhooks"
          with:
            account_id: "tools.account_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-deliverability-stats
          description: "Get email deliverability statistics"
          hints:
            readOnly: true
            openWorld: true
          call: "ahasend.get-deliverability-stats"
          with:
            account_id: "tools.account_id"
          outputParameters:
            - type: object
              mapping: "$."
